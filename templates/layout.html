<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
  {% block head %}{% endblock %}
</head>
<body>

  <!-- ── Noise overlay ──────────────────────────────────────────────────── -->
  <div class="noise-overlay" aria-hidden="true"></div>

  <!-- ── Navigation ────────────────────────────────────────────────────── -->
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <span class="brand-icon">▶</span>
      <span class="brand-text">{{ app_name }}</span>
    </a>

    <div class="navbar-actions">
      <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Library</a>
      <a href="/upload" class="btn-upload {% if request.url.path == '/upload' %}active{% endif %}">
        <span>+ Upload</span>
      </a>
    </div>
  </nav>

  <!-- ── Main content ───────────────────────────────────────────────────── -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ─────────────────────────────────────────────────────────── -->
  <footer class="footer">
    <p>
      <span class="brand-icon-sm">▶</span>
      <strong>{{ app_name }}</strong> &mdash; Private video library powered by AWS S3
    </p>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
